# lefthook.yml - Git hooks configuration
# https://github.com/evilmartians/lefthook
#
# Install hooks: lefthook install
# Run manually:  lefthook run pre-commit
# Skip in CI:    LEFTHOOK=0 git commit ...

pre-commit:
  piped: true
  commands:
    go-fmt:
      glob: "*.go"
      run: golangci-lint fmt ./...
      stage_fixed: true

    go-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~1 --fix
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    go-build:
      glob: "**/*.go"
      run: go build ./...

    go-test:
      glob: "**/*.go"
      run: go test -short -race ./...

# Enforce conventional commits
commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z]+\))?: .+'; then
          echo "Invalid commit format"
          echo "  Format: type(scope): description"
          echo "  Types:  feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
          echo "  Example: fix(bmc): handle null sensor readings"
          exit 1
        fi
