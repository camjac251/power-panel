# =============================================================================
# Release
# =============================================================================
# Triggered on every push to main. release-please manages the release lifecycle:
# opens/updates a Release PR, and on merge creates a git tag + GitHub Release.
# When a release is created, builds cross-platform binaries, publishes to GHCR,
# and uploads release assets.
#
# Quality checks are enforced via branch protection on the Release PR (the CI
# workflow validates every PR and push to main), so checks are not duplicated
# here.
# =============================================================================

name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # release-please: manage Release PR and create releases
  # ---------------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  # ---------------------------------------------------------------------------
  # binaries: cross-compile for all platforms and upload to GitHub Release
  # ---------------------------------------------------------------------------
  binaries:
    name: Build Binaries
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Generate
        run: |
          npm install --no-save tailwindcss
          mise run generate && mise run css

      - name: Build all platforms
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          declare -A TARGETS=(
            [linux-amd64]="linux/amd64/"
            [linux-arm64]="linux/arm64/"
            [linux-armv7]="linux/arm/7"
            [linux-armv6]="linux/arm/6"
            [darwin-arm64]="darwin/arm64/"
            [darwin-amd64]="darwin/amd64/"
            [windows-amd64]="windows/amd64/"
          )

          mkdir -p dist
          for name in "${!TARGETS[@]}"; do
            IFS='/' read -r os arch arm <<< "${TARGETS[$name]}"
            output="power-panel-${name}"
            [ "$os" = "windows" ] && output="${output}.exe"
            echo "Building ${output}..."
            GOOS="$os" GOARCH="$arch" GOARM="${arm}" CGO_ENABLED=0 \
              go build -ldflags="$LDFLAGS" -o "dist/${output}" .
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/power-panel-*
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # docker: build multi-arch image and publish to GHCR
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
